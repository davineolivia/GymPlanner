<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Create New Account</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Manjari:wght@100;400;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="register-styles.css">
</head>

<body>
    <div class="container">
        <div class="left-section">
            <img src="logo.png" alt="GymPlanner Logo">
            <h1>
                Let's Create New Account
            </h1>
            <p>
                Before you are willing and ready to achieve your goals, let us know about your identity, bodyshaper!
            </p>
        </div>
        <div class="right-section">

            <h3>Nickname:</h3>
            <input id="nickname" name="nickname" type="text" />

            <h3>Email:</h3>
            <input id="email" name="email" type="email" />

            <h3>Password:</h3>
            <input id="password" name="password" type="password" />

            <a href="dashboard.html" class="button">CREATE MY ACCOUNT</a>
        </div>

    </div>
</body>

</html>
