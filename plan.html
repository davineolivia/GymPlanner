<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>How About Today?</title>
    <link rel="stylesheet" href="plan-styles.css">
</head>

<body>
    <div class="container">
        <aside class="sidebar">
            <div class="logo">
                <img src="logo.png" alt="GymPlanner Logo">
            </div>
            <nav>
                <ul>
                    <li><a href="dashboard.html"><img src="home.png" alt="Home Icon"></a></li>
                    <li><a href="plan-entry.html"><img src="schedule.png" alt="Schedule Icon"></a></li>
                    <li><a href="#"><img src="checklist.png" alt="Checklist Icon"></a></li>
                    <li><a href="#"><img src="settings.png" alt="Settings Icon"></a></li>
                </ul>
            </nav>
        </aside>
        <main class="form">
            <div class="plan-box">
                <h2>What’s Your Plan, Today?</h2>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="workout-type">Workout Type:</label>
                        <select id="workout-type" name="workout-type" required>
                            <option value="Strength Training">Strength Training</option>
                            <option value="Cardio Workouts">Cardio Workouts</option>
                            <option value="Flexibility & Mobility">Flexibility & Mobility</option>
                            <option value="Functional Training">Functional Training</option>
                            <option value="Core Workouts">Core Workouts</option>
                            <option value="Recovery & Relaxation Workouts">Recovery & Relaxation Workouts</option>
                            <option value="Endurance Workouts">Endurance Workouts</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="body-focus">Body Focus:</label>
                        <select id="body-focus" name="body-focus" required>
                            <option value="Upper Body">Upper Body</option>
                            <option value="Lower Body">Lower Body</option>
                            <option value="Full Body">Full Body</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="location">Location:</label>
                        <select id="location" name="location" required>
                            <option value="at Home">Home</option>
                            <option value="at Gym">Gym</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="workout-date">Workout Date:</label>
                        <input type="date" id="workout-date" name="workout-date" required>
                    </div>
                    <button type="submit">Submit My Plan's Today</button>
                </form>
                <!-- Toast notification -->
                <div id="toast" class="toast">Your plan has been submitted!</div>
                <script>
                    document.querySelector('form').addEventListener('submit', function (event) {
                        event.preventDefault();

                        // Ambil nilai dari input form
                        const workoutType = document.getElementById('workout-type').value;
                        const bodyFocus = document.getElementById('body-focus').value;
                        const location = document.getElementById('location').value;
                        const date = document.getElementById('workout-date').value;

                        let plans = JSON.parse(localStorage.getItem('plans')) || [];

                        // Tambahkan data baru ke dalam array
                        plans.push({
                            WorkoutType: workoutType,
                            BodyFocus: bodyFocus,
                            Location: location,
                            Date: date
                        });

                        localStorage.setItem('plans', JSON.stringify(plans));

                        // Show toast notification
                        const toast = document.getElementById('toast');
                        toast.className = 'toast show';
                        setTimeout(() => { toast.className = 'toast'; }, 3000);
                    });
                </script>
            </div>
        </main>
    </div>
</body>
</html>
