<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>BodyShapers Login</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,200..800&family=Manjari:wght@100;400;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="login-styles.css">
</head>

<body>
    <div class="container">
        <img src="image1.png" alt="GymPlanner Image" class="login-image">
        <div class="login-content">
            <h1>Welcome Back,<br>BodyShapers</h1>
            <h2>ready to crush your goals again?</h2>
            <form>
                <input type="text" placeholder="Username">
                <input type="password" placeholder="Password">
                <button type="submit">Log Me In</button>
            </form>
            <p class="create-account">is this a first for you? <a href="register.html">Create New Account</a></p>
        </div>
    </div>
</body>


</html>
